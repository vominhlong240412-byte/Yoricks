<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yoricks - Cyber System</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --p: #bc13fe; --p-glow: #e2a9ff; --bg: #050505; }
        body { background: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif; margin: 0; overflow-x: hidden; }
        .container { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: radial-gradient(circle, #1a0033 0%, #050505 100%); }
        
        .cyber-card {
            background: rgba(20, 20, 20, 0.9); border: 2px solid var(--p); border-radius: 15px; padding: 40px; width: 400px;
            box-shadow: 0 0 20px var(--p), inset 0 0 10px var(--p); position: relative; text-align: center;
        }
        .cyber-card::before { content: ""; position: absolute; top: -5px; left: -5px; right: -5px; bottom: -5px; border: 1px solid var(--p-glow); border-radius: 18px; opacity: 0.3; pointer-events: none; }

        h2 { font-family: 'Orbitron', sans-serif; text-transform: uppercase; letter-spacing: 5px; color: var(--p-glow); text-shadow: 0 0 10px var(--p); }
        
        input {
            width: 100%; background: #000; border: 1px solid var(--p); padding: 12px; margin: 15px 0; color: #fff;
            border-radius: 5px; outline: none; font-family: 'Rajdhani'; transition: 0.3s;
        }
        input:focus { box-shadow: 0 0 15px var(--p); }

        .btn {
            width: 100%; padding: 15px; border: none; border-radius: 5px; cursor: pointer; font-family: 'Orbitron';
            font-weight: bold; text-transform: uppercase; transition: 0.5s; margin-top: 10px;
        }
        .btn-primary { background: var(--p); color: white; box-shadow: 0 0 10px var(--p); }
        .btn-primary:hover { background: #fff; color: var(--p); box-shadow: 0 0 20px #fff; }
        
        .btn-outline { background: transparent; border: 1px solid var(--p); color: var(--p); margin-top: 20px; }
        .btn-outline:hover { background: rgba(188, 19, 254, 0.1); }

        .status-box { border-left: 5px solid var(--p); background: #111; padding: 15px; margin: 20px 0; text-align: left; }
        .status-box b { color: var(--p-glow); }
        
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="cyber-card" id="auth-section">
        <h2 id="form-title">Login</h2>
        <div id="auth-inputs">
            <input type="text" id="username" placeholder="USERNAME">
            <input type="password" id="password" placeholder="PASSWORD">
            <button class="btn btn-primary" onclick="handleAuth()">Xác Nhận</button>
        </div>
        <p style="font-size: 14px; margin-top: 20px; cursor: pointer; color: #888;" onclick="toggleAuth()" id="toggle-text">
            Chưa có tài khoản? <span style="color: var(--p);">ĐĂNG KÝ</span>
        </p>
    </div>

    <div class="cyber-card hidden" id="main-section">
        <h2>Dashboard</h2>
        <div class="status-box">
            <div>User: <b id="display-user">...</b></div>
            <div>Trạng thái: <b id="key-status">Chưa kích hoạt</b></div>
            <div>Hết hạn: <b id="key-expiry">N/A</b></div>
        </div>
        
        <input type="text" id="activation-key" placeholder="NHẬP KEY TẠI ĐÂY">
        <button class="btn btn-primary" onclick="activateKey()">KÍCH HOẠT NGAY</button>
        
        <button class="btn btn-outline" onclick="location.href='getkey.html'">LẤY KEY MIỄN PHÍ</button>
        
        <button class="btn" style="background: #333; color: #888; margin-top: 20px;" onclick="logout()">LOGOUT</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCJOmyua7gtX022ITp7w-eOr3TSkN0UikM",
        authDomain: "yoricks-sytem.firebaseapp.com",
        databaseURL: "https://yoricks-sytem-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "yoricks-sytem",
        storageBucket: "yoricks-sytem.firebasestorage.app",
        messagingSenderId: "318734426446",
        appId: "1:318734426446:web:e62527dfe42d8cf48e7e1f"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let isLoginMode = true;

    function toggleAuth() {
        isLoginMode = !isLoginMode;
        document.getElementById('form-title').innerText = isLoginMode ? "Login" : "Register";
        document.getElementById('toggle-text').innerHTML = isLoginMode ? 
            'Chưa có tài khoản? <span style="color: var(--p);">ĐĂNG KÝ</span>' : 
            'Đã có tài khoản? <span style="color: var(--p);">ĐĂNG NHẬP</span>';
    }

    function handleAuth() {
        const u = document.getElementById('username').value;
        const p = document.getElementById('password').value;
        if(!u || !p) return Swal.fire('Lỗi', 'Không được để trống!', 'error');

        if(!isLoginMode) {
            db.ref('users/' + u).set({ password: p, status: "Chưa kích hoạt", exp: "N/A", banned: false })
            .then(() => {
                Swal.fire('Thành công', 'Đăng ký hoàn tất! Hãy đăng nhập.', 'success');
                toggleAuth();
            });
        } else {
            db.ref('users/' + u).once('value', s => {
                if(s.exists() && s.val().password === p) {
                    if(s.val().banned) return Swal.fire('Bị khóa', 'Tài khoản bạn đã bị BAN!', 'error');
                    localStorage.setItem("user", u);
                    loadPanel(s.val(), u);
                    Swal.fire('Chào mừng', 'Đăng nhập thành công!', 'success');
                } else {
                    Swal.fire('Lỗi', 'Sai tài khoản hoặc mật khẩu!', 'error');
                }
            });
        }
    }

    function loadPanel(data, u) {
        document.getElementById('auth-section').classList.add('hidden');
        document.getElementById('main-section').classList.remove('hidden');
        document.getElementById('display-user').innerText = u;
        document.getElementById('key-status').innerText = data.status;
        document.getElementById('key-expiry').innerText = data.exp;
    }

    function activateKey() {
        const k = document.getElementById('activation-key').value;
        const u = localStorage.getItem("user");
        if(!k) return Swal.fire('Nhắc nhở', 'Vui lòng nhập Key!', 'warning');

        db.ref('keys/' + k).once('value', s => {
            if(s.exists() && !s.val().used) {
                db.ref('users/' + u).update({ status: "Đã kích hoạt", exp: s.val().duration + " ngày" });
                db.ref('keys/' + k).update({ used: true, usedBy: u });
                Swal.fire('Tuyệt vời', 'Kích hoạt thành công!', 'success').then(() => location.reload());
            } else {
                Swal.fire('Lỗi', 'Key không tồn tại hoặc đã dùng!', 'error');
            }
        });
    }

    function logout() { localStorage.clear(); location.reload(); }
</script>
</body>
</html>
