<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Yoricks - Success</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --p: #bc13fe; --bg: #050505; }
        body { background: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .success-card { background: #111; border: 2px solid var(--p); padding: 40px; border-radius: 15px; text-align: center; box-shadow: 0 0 30px var(--p); width: 400px; }
        .key-display { background: #000; border: 1px dashed var(--p); color: #fff; font-family: 'Orbitron'; font-size: 20px; padding: 20px; margin: 20px 0; word-break: break-all; text-shadow: 0 0 5px var(--p); }
        .btn-copy { background: #fff; color: #000; border: none; padding: 15px 30px; font-weight: bold; cursor: pointer; border-radius: 5px; font-family: 'Orbitron'; transition: 0.3s; }
        .btn-copy:hover { background: var(--p); color: #fff; }
    </style>
</head>
<body>

<div class="success-card">
    <h1 style="color: var(--p);">THÀNH CÔNG!</h1>
    <p>Hệ thống đã xác nhận. Key của bạn là:</p>
    <div class="key-display" id="key-val">ĐANG TẠO...</div>
    <button class="btn-copy" onclick="copyKey()">SAO CHÉP KEY</button>
    <p style="margin-top: 20px; font-size: 13px; color: #555;">Quay lại trang chủ để kích hoạt ngay.</p>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCJOmyua7gtX022ITp7w-eOr3TSkN0UikM",
        authDomain: "yoricks-sytem.firebaseapp.com",
        databaseURL: "https://yoricks-sytem-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "yoricks-sytem",
        storageBucket: "yoricks-sytem.firebasestorage.app",
        messagingSenderId: "318734426446",
        appId: "1:318734426446:web:e62527dfe42d8cf48e7e1f"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    window.onload = function() {
        const type = localStorage.getItem("pendingKeyType") || 1;
        const randomKey = "YOR-" + Math.random().toString(36).substring(2, 12).toUpperCase();
        
        db.ref('keys/' + randomKey).set({ duration: type, used: false })
        .then(() => {
            document.getElementById('key-val').innerText = randomKey;
            localStorage.removeItem("pendingKeyType");
            Swal.fire('Hoàn tất', 'Đã tạo mã key mới!', 'success');
        });
    };

    function copyKey() {
        const k = document.getElementById('key-val').innerText;
        navigator.clipboard.writeText(k);
        Swal.fire('Đã Copy', 'Hãy dán vào trang chủ để dùng!', 'success');
    }
</script>
</body>
</html>
