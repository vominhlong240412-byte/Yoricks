<!DOCTYPE html>
<html>
<head>
    <title>Admin - Yoricks Master</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        body { background: #050505; color: #bc13fe; font-family: sans-serif; padding: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .card { background: #111; border: 1px solid #333; padding: 20px; border-radius: 10px; }
        input, select, button { width: 100%; padding: 10px; margin: 5px 0; background: #000; color: #fff; border: 1px solid #bc13fe; }
        button { background: #bc13fe; cursor: pointer; font-weight: bold; }
        table { width: 100%; margin-top: 10px; color: white; font-size: 12px; }
        th { text-align: left; color: #bc13fe; }
    </style>
</head>
<body>
    <h1 style="text-align: center;">YORICKS ADMIN SYSTEM</h1>
    
    <div class="grid">
        <div class="card">
            <h3>Tạo Key Mới</h3>
            <select id="k-days"><option value="1">1 Ngày</option><option value="3">3 Ngày</option><option value="7">7 Ngày</option></select>
            <button onclick="genKey()">GIAO KEY</button>
            <div id="new-key" style="margin-top:10px; font-weight:bold; color:white;"></div>
        </div>

        <div class="card">
            <h3>Cài đặt Link4M</h3>
            <input type="text" id="l1" placeholder="Link 1 Ngày">
            <input type="text" id="l3" placeholder="Link 3 Ngày">
            <input type="text" id="l7" placeholder="Link 7 Ngày">
            <button onclick="saveLinks()">LƯU LINK</button>
        </div>
    </div>

    <div class="card" style="margin-top: 20px;">
        <h3>Danh Sách Người Dùng & Key</h3>
        <table border="1">
            <thead>
                <tr><th>User</th><th>Pass</th><th>Status</th><th>Exp</th><th>Hành động</th></tr>
            </thead>
            <tbody id="user-list"></tbody>
        </table>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCJOmyua7gtX022ITp7w-eOr3TSkN0UikM",
        authDomain: "yoricks-sytem.firebaseapp.com",
        databaseURL: "https://yoricks-sytem-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "yoricks-sytem",
        storageBucket: "yoricks-sytem.firebasestorage.app",
        messagingSenderId: "318734426446",
        appId: "1:318734426446:web:e62527dfe42d8cf48e7e1f"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function genKey() {
        const d = document.getElementById('k-days').value;
        const k = "YOR-" + Math.random().toString(36).substring(2, 10).toUpperCase();
        db.ref('keys/' + k).set({ duration: d, used: false })
        .then(() => {
            document.getElementById('new-key').innerText = "MÃ MỚI: " + k;
            Swal.fire('Xong', 'Đã tạo key thành công', 'success');
        });
    }

    function saveLinks() {
        db.ref('settings/links').set({
            d1: document.getElementById('l1').value,
            d3: document.getElementById('l3').value,
            d7: document.getElementById('l7').value
        }).then(() => Swal.fire('Thành công', 'Đã lưu cấu hình link!', 'success'));
    }

    // Load user database
    db.ref('users').on('value', s => {
        const users = s.val();
        let html = "";
        for(let u in users) {
            html += `<tr>
                <td>${u}</td>
                <td>${users[u].password}</td>
                <td>${users[u].status}</td>
                <td>${users[u].exp}</td>
                <td><button onclick="ban('${u}', ${users[u].banned})">${users[u].banned ? 'Unban' : 'BAN'}</button></td>
            </tr>`;
        }
        document.getElementById('user-list').innerHTML = html;
    });

    function ban(u, st) {
        db.ref('users/' + u).update({ banned: !st });
    }
</script>
</body>
</html>
